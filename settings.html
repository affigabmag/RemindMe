<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RemindMe Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: rgba(45, 52, 54, 0.25);
      backdrop-filter: blur(5px);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(45, 52, 54, 0.25);
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .header {
      background: rgba(0, 0, 0, 0.4);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .header h1 {
      font-size: 24px;
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .close-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .content {
      padding: 20px;
      color: #fff;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(45, 52, 54, 0.3);
    }

    thead {
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #fff;
      font-size: 14px;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      color: #fff;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .action-cell {
      text-align: center;
      width: 100px;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      margin: 0 4px;
    }

    .btn-edit {
      background: #007bff;
      color: white;
    }

    .btn-edit:hover {
      background: #0056b3;
    }

    .btn-delete {
      background: #dc3545;
      color: white;
    }

    .btn-delete:hover {
      background: #c82333;
    }

    .btn-add {
      background: #28a745;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
    }

    .btn-add:hover {
      background: #218838;
    }

    .btn-save {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
    }

    .btn-save:hover {
      background: #0056b3;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, 0.7);
    }

    .empty-state p {
      margin: 0;
      font-size: 16px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: rgba(45, 52, 54, 0.95);
      border-radius: 8px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(5px);
    }

    .modal-header {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #fff;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .form-group input:focus {
      outline: none;
      border-color: #007bff;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 3px rgba(0,123,255,0.25);
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: #6c757d;
      color: white;
      padding: 10px 20px;
    }

    .btn-cancel:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ RemindMe Settings</h1>
      <button class="close-btn" id="closeSettings">✕</button>
    </div>

    <div class="content">
      <div class="table-wrapper">
        <table id="remindersTable">
          <thead>
            <tr>
              <th>Reminder</th>
              <th>Domain/URL</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Will be populated by JS -->
          </tbody>
        </table>
      </div>

      <div class="actions">
        <button class="btn btn-add" id="addBtn">+ Add Reminder</button>
        <button class="btn btn-save" id="saveBtn">💾 Save All</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header" id="modalTitle">Add Reminder</div>

      <div class="form-group">
        <label for="reminderInput">Reminder Text</label>
        <input type="text" id="reminderInput" placeholder="e.g., Use Cashback.co.il">
      </div>

      <div class="form-group">
        <label for="urlInput">Domain/URL</label>
        <input type="text" id="urlInput" placeholder="e.g., amazon.com">
      </div>

      <div class="modal-footer">
        <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn btn-save" id="saveItemBtn">Save</button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
